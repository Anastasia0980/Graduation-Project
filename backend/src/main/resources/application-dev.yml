spring:
  application:
    name: RLplatform
  datasource:
    url: jdbc:mysql://localhost:3306/rl_platform
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    org.springframework.web.servlet.mapping: DEBUG

#TODO: 需要修改为实际的路径
evaluation:
  python: "E:/Anaconda/envs/rl/python.exe"
  script: "scripts/evaluate.py"
  battle_script: "scripts/battle_evaluator.py"
  workspace: "E:/RL_Result"

